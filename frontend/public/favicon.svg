<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <g id="star">
      <polygon points="0,-14 3.23,-4.45 13.32,-4.33 5.23,1.70 8.23,11.33 0,5.5 -8.23,11.33 -5.23,1.70 -13.32,-4.33 -3.23,-4.45" fill="#F5C518"/>
    </g>
  </defs>
  <!-- Tail -->
  <polygon points="62,125 88,130 30,172" fill="white" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- Main bubble (drawn on top to hide tail seams) -->
  <ellipse cx="105" cy="82" rx="80" ry="55" fill="white" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Stars row 1 -->
  <use href="#star" transform="translate(65, 76)"/>
  <use href="#star" transform="translate(105, 76)"/>
  <use href="#star" transform="translate(145, 76)"/>
  <!-- Stars row 2 -->
  <use href="#star" transform="translate(85, 102)"/>
  <use href="#star" transform="translate(125, 102)"/>
</svg>
